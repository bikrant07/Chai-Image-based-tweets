<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Project{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #13172f 0%, #090b16 50%, #02030a 100%);
            color: #f8fafc;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .navbar {
            background: rgba(10, 15, 34, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #7dd3fc !important;
        }
        .nav-link {
            color: rgba(226, 232, 240, 0.88) !important;
        }
        .nav-link:hover,
        .nav-link.active {
            color: #ffffff !important;
        }
        .hero-header {
            padding: 3rem 0 1.5rem;
        }
        .hero-header h1 {
            color: #e2e8f0;
        }
        .hero-header p {
            color: #cbd5e1;
        }
        .tweet-card {
            max-width: 22rem;
            margin: 0 auto;
            border: 1px solid rgba(148, 163, 184, 0.14);
            background: rgba(8, 12, 25, 0.95);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .tweet-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 50px rgba(15, 23, 42, 0.35);
        }
        .tweet-card-img {
            max-height: 240px;
            object-fit: cover;
        }
        .card-title {
            color: #a5b4fc;
        }
        .card-text {
            color: #cbd5e1;
            min-height: 4.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4338ca);
            border: none;
            box-shadow: 0 8px 25px rgba(67, 56, 202, 0.18);
        }
        .btn-success {
            background: linear-gradient(135deg, #14b8a6, #0f766e);
            border: none;
            box-shadow: 0 8px 25px rgba(15, 118, 110, 0.18);
        }
        .btn-danger {
            background: linear-gradient(135deg, #fb7185, #dc2626);
            border: none;
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.18);
        }
        .btn-outline-success,
        .btn-outline-danger {
            border-color: rgba(148, 163, 184, 0.35);
            color: #e2e8f0;
        }
        .btn-outline-success:hover,
        .btn-outline-danger:hover {
            color: #ffffff;
        }
        .form-card,
        .confirm-card {
            max-width: 40rem;
            margin: 2rem auto 4rem;
            padding: 2rem;
            background: rgba(10, 15, 34, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 1.25rem;
            box-shadow: 0 24px 55px rgba(15, 23, 42, 0.28);
        }
        .form-card h1,
        .confirm-card h1 {
            color: #e2e8f0;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #f8fafc;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #6366f1;
            box-shadow: 0 0 0 0.15rem rgba(99, 102, 241, 0.25);
        }
        .form-text,
        .form-label,
        label {
            color: #cbd5e1;
        }
        .page-section {
            padding-bottom: 3rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="{% url 'tweet_list' %}">ChaiHeadQ</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'tweet_list' %}">Home</a>
        </li>
      </ul>
      <div class="d-flex align-items-center">
        {% if user.is_authenticated %}
          <span class="me-3 text-muted">Hi, {{ user.username }}</span>
          <a href="{% url 'logout' %}" class="btn btn-outline-danger">Logout</a>
        {% else %}
          <a href="{% url 'login' %}" class="btn btn-outline-success">Login</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
    <div class="container page-section">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
