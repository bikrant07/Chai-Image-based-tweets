{% extends 'layout.html' %}
{% block title %}
    Register
{% endblock %}
{% block content %}
    <div class="form-card">
        <h1 class="text-center mb-4">Create your account</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Register</button>
        </form>
        <p class="text-center text-muted mt-3">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
{% endblock %}
