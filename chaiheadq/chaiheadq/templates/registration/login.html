{% extends 'layout.html' %}

{% block title %}
    Login
{% endblock %}

{% block content %}
    <div class="form-card">
        <h1 class="text-center mb-4">Welcome Back</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
        </form>
        <p class="text-center text-muted mt-3">Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>
    </div>
{% endblock %}
