{% extends "layout.html" %}

{% block title %} 
   Tweet Form 
{% endblock %}

{% block content %}
    <div class="form-card">
        {% if form.instance.pk %}
            <h1 class="text-center mb-4">Edit Tweet</h1>
        {% else %}
            <h1 class="text-center mb-4">Create a New Tweet</h1>
        {% endif %}
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Submit</button>
        </form>
    </div>
{% endblock %}
